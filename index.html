<!DOCTYPE html>
<html>
<head>
    <title>Question Difficulty Analyzer</title>
</head>
<body>

    <h2>Question Difficulty Analyzer</h2>

    <input type="text" id="question" placeholder="Enter your question" size="50">
    <button onclick="predict()">Check Difficulty</button>

    <h3 id="result"></h3>

    <script>
        async function predict() {
            let question = document.getElementById("question").value;

            let response = await fetch("http://127.0.0.1:5000/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ question: question })
            });

            let data = await response.json();
            document.getElementById("result").innerText = "Difficulty: " + data.difficulty;
        }
    </script>

</body>
</html>
